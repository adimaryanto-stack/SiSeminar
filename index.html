<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      const errorDiv = document.createElement('div');
      errorDiv.style.position = 'fixed';
      errorDiv.style.top = '0';
      errorDiv.style.left = '0';
      errorDiv.style.width = '100vw';
      errorDiv.style.background = '#fee2e2';
      errorDiv.style.color = '#991b1b';
      errorDiv.style.padding = '20px';
      errorDiv.style.zIndex = '999999';
      errorDiv.style.fontFamily = 'monospace';
      errorDiv.style.borderBottom = '4px solid #ef4444';
      errorDiv.style.fontSize = '14px';
      
      let stackHtml = '';
      if (error && error.stack) {
        stackHtml = '<pre style="background:#fecaca; padding:10px; border-radius:4px; overflow:auto; max-height:200px; white-space:pre-wrap;">' + error.stack + '</pre>';
      }

      errorDiv.innerHTML = 
        '<h3 style="margin-top:0;">🔴 KESALAHAN JAVASCRIPT DETECTED:</h3>' +
        '<p><strong>Pesan:</strong> ' + message + '</p>' +
        '<p><strong>File:</strong> ' + source + ' (Baris: ' + lineno + ', Kolom: ' + colno + ')</p>' +
        stackHtml +
        '<button onclick="this.parentElement.remove()" style="margin-top:10px; padding:6px 12px; background:#991b1b; color:white; border:none; border-radius:4px; cursor:pointer;">Tutup</button>';
      
      document.body.appendChild(errorDiv);
      return false;
    };
  </script>
